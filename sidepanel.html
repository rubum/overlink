<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Overlink Side Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div id="sidepanel-container">
        <div id="sidepanel-header">
            <div id="tab-bar">
                <!-- Tabs will be injected here dynamically -->
            </div>
            <div id="header-actions">
                <button id="close-all-btn" title="Close Panel">&times;</button>
            </div>
        </div>
        <div id="content-area">
            <!-- Iframes and placeholders will be injected here -->
            <div id="empty-state">
                <p>Welcome to Overlink Side Panel</p>
                <span>Right-click a link or highlight text to open it here.</span>
            </div>
        </div>
    </div>
    <script src="sidepanel.js"></script>
</body>
</html>
